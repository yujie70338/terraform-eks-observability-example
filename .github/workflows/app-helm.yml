name: App & Helm CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'helm/static-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'helm/static-web/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  EKS_CLUSTER_NAME: eks-obs-dev
  IMAGE_REPO: yujie70338/static-web
  HELM_RELEASE: static-web
  HELM_NAMESPACE: app
  # 2026 年 6 月前的過渡期強制使用 Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Stage 1: Lint & Validate
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 確保為 v4 以上

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: warning

      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0 # 升級到最新小版本

      - name: Helm Lint
        run: helm lint helm/static-web/

      - name: Helm Template (dry-run)
        run: helm template static-web helm/static-web/ --namespace app

  # Stage 2: Build & Security Scan
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.short_sha.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: short_sha
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: Build single-platform image locally for Trivy scanning
      - name: Build (local, amd64 only) for scanning
        uses: docker/build-push-action@v6
        with:
          context: app/
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_REPO }}:${{ steps.short_sha.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Image Security Scan (uses locally loaded image above)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ steps.short_sha.outputs.value }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Step 2: Build multi-platform and push to DockerHub (main only)
      - name: Build and Push (multi-platform)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: app/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.short_sha.outputs.value }}
            ${{ env.IMAGE_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Stage 3: Deploy to EKS (main only)
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.lint.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Setup Helm
        uses: azure/setup-helm@v4.2.0

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ needs.build.outputs.image_tag }}" != "" ]]; then
            echo "value=${{ needs.build.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(grep 'tag:' helm/static-web/values.yaml | awk '{print $2}' | tr -d '"')
            echo "value=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Helm Upgrade
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/static-web/ \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --set image.tag=${{ steps.tag.outputs.value }} \
            --wait \
            --timeout 5m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE }} \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=120s
          echo "--- Pod Status ---"
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} -o wide
          echo "--- Ingress ---"
          kubectl get ingress -n ${{ env.HELM_NAMESPACE }}

      - name: Comment Deploy Result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'Success' : 'Failed';
            const tag = '${{ steps.tag.outputs.value }}';
            const body = `### Deploy ${status}\n- **Image:** \`${{ env.IMAGE_REPO }}:${tag}\`\n- **Cluster:** \`${{ env.EKS_CLUSTER_NAME }}\`\n- **Namespace:** \`${{ env.HELM_NAMESPACE }}\``;

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: body,
              });
            }